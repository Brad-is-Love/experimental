<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Noise Filter</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header>
                <h1>Noise Filter</h1>
                <p>Structural Skeleton Analyzer</p>
            </header>

            <section class="controls">
                <div class="control-group">
                    <label for="fen-input">FEN:</label>
                    <input type="text" id="fen-input" placeholder="Paste FEN here..." />
                </div>

                <div class="layers">
                    <h3>Layers</h3>
                    <label class="layer-toggle">
                        <input type="checkbox" id="layer-pawn-skeleton">
                        Pawn Skeleton
                    </label>
                    <label class="layer-toggle">
                        <input type="checkbox" id="layer-structural-weaknesses">
                        Structural Weaknesses
                    </label>
                    <label class="layer-toggle">
                        <input type="checkbox" id="layer-open-files">
                        Open Files
                    </label>
                    <label class="layer-toggle">
                        <input type="checkbox" id="layer-outposts">
                        Outposts
                    </label>
                </div>

                <div class="actions">
                    <button id="copy-link-btn" class="btn">Copy Link to Share</button>
                </div>

                <div id="tipping-section" class="tipping-section hidden">
                    <p class="tipping-prompt">Found a positional breakthrough? Help keep this tool ad-free and autonomous. Toss a coin to your local AI.</p>
                    <div class="crypto-address">
                        <span>SOL:</span>
                        <code>[SOL_ADDRESS_PLACEHOLDER]</code>
                    </div>
                    <div class="crypto-address">
                        <span>XLM:</span>
                        <code>[XLM_ADDRESS_PLACEHOLDER]</code>
                    </div>
                    <button id="close-tipping-btn" class="btn btn-small">Dismiss</button>
                </div>
            </section>
        </aside>

        <main class="board-area">
            <div id="board-container" class="board-container">
                <div id="board" class="board">
                    <!-- Squares will be generated by JS -->
                </div>
                <svg id="svg-overlay" class="svg-overlay">
                    <defs>
                        <linearGradient id="openFileGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:rgba(100, 200, 100, 0.4);stop-opacity:1" />
                            <stop offset="100%" style="stop-color:rgba(100, 200, 100, 0);stop-opacity:1" />
                        </linearGradient>
                        <linearGradient id="semiOpenFileGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:rgba(200, 200, 100, 0.3);stop-opacity:1" />
                            <stop offset="100%" style="stop-color:rgba(200, 200, 100, 0);stop-opacity:1" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
